on:
  workflow_call:
  workflow_dispatch:

jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
        - name: Install Go
          uses: actions/setup-go@v5
          with:
            go-version: 1.26.x
  
        - name: Checkout code
          uses: actions/checkout@v4
  
        - name: Lint
          uses: golangci/golangci-lint-action@v9
          with:
            version: v2.11.4
            args:
              --config=./.github/golangci.yml